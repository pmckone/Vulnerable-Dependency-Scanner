name: Supply Chain Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * *'

jobs:
  python-scan:
    name: Python Dependency Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scanner dependencies
        run: pip install -r requirements.txt

      - name: Run security scan
        run: |
          python scanner.py sample-projects/python-app \
            --output ${{ github.workspace }}/scan-results-python.json \
            --verbose

      - name: Upload python scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-python
          path: ${{ github.workspace }}/scan-results-python.json
          retention-days: 90
          if-no-files-found: warn

      - name: Comment PR with findings
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('scan-results-python.json', 'utf8'));
            const blocking = report.findings.filter(f => f.fail_build);

            let body = `## Security Scan Failed - Python\n\n`;
            body += `Found **${blocking.length}** HIGH/CRITICAL vulnerabilities:\n\n`;
            body += `| Package | Version | CVE | Severity |\n`;
            body += `|---------|---------|-----|----------|\n`;

            for (const f of blocking) {
              const cve = f.cve_ids.length ? f.cve_ids[0] : f.vuln_id;
              body += `| \`${f.package}\` | ${f.version} | ${cve} | **${f.severity}** |\n`;
            }

            body += `\nFull report available in workflow artifacts.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  node-scan:
    name: Node.js Dependency Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install scanner dependencies
        run: pip install -r requirements.txt

      - name: Run npm audit
        run: |
          cd sample-projects/node-app
          npm install --package-lock-only
          npm audit --audit-level=high
        continue-on-error: true

      - name: Run custom scanner
        run: |
          python scanner.py sample-projects/node-app \
            --output ${{ github.workspace }}/scan-results-node.json \
            --verbose

      - name: Upload node scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-node
          path: ${{ github.workspace }}/scan-results-node.json
          retention-days: 90
          if-no-files-found: warn

      - name: Comment PR with findings
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('scan-results-node.json', 'utf8'));
            const blocking = report.findings.filter(f => f.fail_build);

            let body = `## Security Scan Failed - Node.js\n\n`;
            body += `Found **${blocking.length}** HIGH/CRITICAL vulnerabilities:\n\n`;
            body += `| Package | Version | CVE | Severity |\n`;
            body += `|---------|---------|-----|----------|\n`;

            for (const f of blocking) {
              const cve = f.cve_ids.length ? f.cve_ids[0] : f.vuln_id;
              body += `| \`${f.package}\` | ${f.version} | ${cve} | **${f.severity}** |\n`;
            }

            body += `\nFull report available in workflow artifacts.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  ruby-scan:
    name: Ruby Dependency Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scanner dependencies
        run: pip install -r requirements.txt

      - name: Run security scan
        run: |
          python scanner.py sample-projects/ruby-app \
            --output ${{ github.workspace }}/scan-results-ruby.json \
            --verbose

      - name: Upload ruby scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-ruby
          path: ${{ github.workspace }}/scan-results-ruby.json
          retention-days: 90
          if-no-files-found: warn

  clean-scan:
    name: Clean App Scan (expected to pass)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scanner dependencies
        run: pip install -r requirements.txt

      - name: Run security scan
        run: |
          python scanner.py sample-projects/clean-app \
            --output ${{ github.workspace }}/scan-results-clean.json \
            --verbose

      - name: Upload clean scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-clean
          path: ${{ github.workspace }}/scan-results-clean.json
          retention-days: 90
          if-no-files-found: warn

  transitive-scan:
    name: Full Transitive Tree Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install scanner dependencies
        run: pip install -r requirements.txt

      - name: Run transitive scan on python sample
        run: |
          python scanner.py sample-projects/python-app \
            --transitive \
            --output ${{ github.workspace }}/scan-results-transitive-python.json \
            --verbose
        continue-on-error: true

      - name: Run transitive scan on node sample
        run: |
          python scanner.py sample-projects/node-app \
            --transitive \
            --output ${{ github.workspace }}/scan-results-transitive-node.json \
            --verbose
        continue-on-error: true

      - name: Upload transitive scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-transitive
          path: |
            ${{ github.workspace }}/scan-results-transitive-python.json
            ${{ github.workspace }}/scan-results-transitive-node.json
          retention-days: 90
          if-no-files-found: warn