name: Supply Chain Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * *'

jobs:
  dependency-scan:
    name: CVE Dependency Scan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scanner
        run: |
          pip install --upgrade pip
          # No extra deps needed — scanner uses stdlib only

      - name: Run security scan
        id: scan
        run: |
          python Scanner/scanner.py . \
            --output scan-results.json \
            --verbose

      - name: Upload scan results artifact
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: scan-results.json
          retention-days: 90

      - name: Comment PR with findings
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('scan-results.json', 'utf8'));
            const blocking = report.findings.filter(f => f.fail_build);

            let body = `## Security Scan Failed\n\n`;
            body += `Found **${blocking.length}** HIGH/CRITICAL vulnerabilities:\n\n`;
            body += `| Package | Version | CVE | Severity |\n`;
            body += `|---------|---------|-----|----------|\n`;

            for (const f of blocking) {
              const cve = f.cve_ids.length ? f.cve_ids[0] : f.vuln_id;
              body += `| \`${f.package}\` | ${f.version} | ${cve} | **${f.severity}** |\n`;
            }

            body += `\n Full report available in workflow artifacts.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  node-scan:
    name: Node.js Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for package.json
        id: check
        run: |
          if [ -f package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Run npm audit
        if: steps.check.outputs.exists == 'true'
        run: npm audit --audit-level=high

      - name: Run custom scanner
        if: steps.check.outputs.exists == 'true'
        run: python Scanner/scanner.py . --output node-scan-results.json

      - name: Upload node scan results
        if: steps.check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: node-scan-results
          path: node-scan-results.json
